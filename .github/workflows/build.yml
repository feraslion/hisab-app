
name: Build HisabApp

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Next.js export
        run: npm run build

      - name: Build EXE
        run: npm run build:exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: HisabApp-EXE
          path: dist/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Capacitor Init
        run: |
          npx cap add android || true
          npx cap sync android

      - name: Grant gradlew permission
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HisabApp-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk